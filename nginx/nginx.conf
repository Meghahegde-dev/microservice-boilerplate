worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ----------------------------
    # 1️⃣ Rate Limiting
    # ----------------------------
    # Track requests per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # ----------------------------
    # 2️⃣ Cache Configuration
    # ----------------------------
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=my_cache:10m max_size=100m inactive=60m use_temp_path=off;

    # ----------------------------
    # 3️⃣ Backend API Gateway
    # ----------------------------
    upstream api_gateway {
        server api-gateway:4000;
    }

    server {
        listen 80;

        # ----------------------------
        # 4️⃣ Proxy all requests
        # ----------------------------
        location / {
            # ---------- Rate Limiting ----------
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # ---------- Caching ----------
            proxy_cache my_cache;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_valid 500 30s;
            proxy_cache_methods GET;              # Cache only GET requests
            proxy_cache_bypass $http_cache_control; # Bypass if client requests no-cache

            # ---------- Proxy Pass ----------
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_key "$scheme$request_method$host$request_uri"; # Unique cache key
        }

        # Optional: you can exclude dynamic endpoints from caching
        location /orders {
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}